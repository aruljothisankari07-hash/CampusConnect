<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Details</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
<div class="logo">CampusConnect</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="companies.html">Companies</a></li>
<li><a href="applied-drives.html">Applied Drives</a></li>
</ul>
</nav>

<section class="jobs">

<h2 id="companyName">Company Details</h2>

<div class="company-card">

<p><strong>Package:</strong> ₹6 LPA</p>

<p><strong>Eligibility:</strong> 60% and above</p>

<p><strong>Location:</strong> India</p>

<p><strong>Role:</strong> Software Engineer</p>

<button onclick="applyDrive()">
Apply Drive 🚀
</button>

</div>

</section>

<script>

const params =
new URLSearchParams(window.location.search);

const company =
params.get("company");

document.getElementById("companyName").innerText =
company || "Company Details";

function applyDrive(){

let appliedDrives =
JSON.parse(localStorage.getItem("appliedDrives")) || [];

if(!appliedDrives.includes(company)){

appliedDrives.push(company);

localStorage.setItem(
"appliedDrives",
JSON.stringify(appliedDrives)
);

showToast(company + " Applied Successfully 🎉");

}else{

showToast("Already Applied ❗");

}

}

</script>

<script src="script.js"></script>

</body>
</html>
