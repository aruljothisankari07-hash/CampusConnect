<section class="jobs">

<h2>Upcoming Placement Drives 🚀</h2>

<div class="company-container">

<div class="company-card">
<h2>TCS</h2>
<p>📅 25 June 2026</p>
<p>💼 Ninja Hiring</p>
<button onclick="applyDrive('TCS')">
Apply Now
</button>
</div>

<div class="company-card">
<h2>Infosys</h2>
<p>📅 30 June 2026</p>
<p>💼 System Engineer</p>
<button onclick="applyDrive('Infosys')">
Apply Now
</button>
</div>

<div class="company-card">
<h2>Zoho</h2>
<p>📅 05 July 2026</p>
<p>💼 Software Developer</p>
<button onclick="applyDrive('Zoho')">
Apply Now
</button>
</div>

<div class="company-card">
<h2>Accenture</h2>
<p>📅 10 July 2026</p>
<p>💼 Associate Engineer</p>
<button onclick="applyDrive('Accenture')">
Apply Now
</button>
</div>

</div>

</section>

<script type="module">

import { auth, db } from "./firebase.js";

import {
doc,
updateDoc,
arrayUnion
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

window.applyDrive = async function(companyName){

const user = auth.currentUser;

if(!user){

alert("Please Login First ❗");
window.location.href = "login.html";
return;

}

try{

await updateDoc(
doc(db, "users", user.uid),
{
appliedDrives: arrayUnion(companyName)
}
);

alert(companyName + " Applied Successfully 🎉");

}
catch(error){

console.log(error);
alert(error.message);

}

}

</script>

<script src="script.js"></script>

</body>
