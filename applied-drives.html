<section class="jobs">

<h2>Applied Drives 🚀</h2>

<div id="appliedContainer"></div>

</section>

<script>

function loadAppliedDrives(){

let drives =
JSON.parse(localStorage.getItem("appliedDrives")) || [];

let container =
document.getElementById("appliedContainer");

container.innerHTML = "";

if(drives.length === 0){

container.innerHTML =
"<h3>No Applied Drives Yet ❌</h3>";

return;
}

drives.forEach(company => {

container.innerHTML += `
<div class="company-card">
<h2>${company}</h2>
<p>Application Submitted ✅</p>

<button onclick="removeDrive('${company}')">
Remove
</button>

</div>
`;

});

}

function removeDrive(company){

let drives =
JSON.parse(localStorage.getItem("appliedDrives")) || [];

drives = drives.filter(item => item !== company);

localStorage.setItem(
"appliedDrives",
JSON.stringify(drives)
);

showToast("Application Removed ❌");

loadAppliedDrives();

}

loadAppliedDrives();

</script>

<script src="script.js"></script>

</body>
</html>
